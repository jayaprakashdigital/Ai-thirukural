  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

te; bottom:8px; right:8px; font-size:10.5px; font-weight:600; background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:5px; color:#e4e4e7;\">{{ v.duration }}<\u002Fspan>\n                  <span style=\"position:absolute; top:8px; left:8px; font-size:9.5px; font-weight:700; padding:2px 7px; border-radius:6px; background:{{ v.stageBg }}; color:{{ v.stageColor }};\">{{ v.storyStageLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"padding:14px; display:flex; flex-direction:column; gap:8px; flex:1;\">\n                  <div style=\"font-size:13px; font-weight:700; color:#f4f4f5;\">Kural #{{ v.num }} — {{ v.chapterEnglish }}<\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:12px; font-size:11px; color:#71717a;\">\n                    <span style=\"display:flex; align-items:center; gap:4px;\"><i data-lucide=\"star\" style=\"width:11px; height:11px; color:#fbbf24;\"><\u002Fi>{{ v.quality }}<\u002Fspan>\n                    <span>{{ v.createdText }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; gap:6px; margin-top:4px;\">\n                    <button style=\"flex:1; padding:6px 0; border-radius:7px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); color:#d4d4d8; font-size:11px; font-weight:600; cursor:pointer;\">Preview<\u002Fbutton>\n                    <button style=\"flex:1; padding:6px 0; border-radius:7px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); color:#d4d4d8; font-size:11px; font-weight:600; cursor:pointer;\">Download<\u002Fbutton>\n                    <button style=\"width:30px; padding:6px 0; border-radius:7px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:#f87171; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center;\"><i data-lucide=\"trash-2\" style=\"width:12px; height:12px;\"><\u002Fi><\u002Fbutton>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ v.showApprove }}\" hint-placeholder-val=\"{{ false }}\">\n                    <button style=\"padding:6px 0; border-radius:7px; background:rgba(34,197,94,0.14); border:1px solid rgba(34,197,94,0.3); color:#4ade80; font-size:11px; font-weight:600; cursor:pointer;\">Approve<\u002Fbutton>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ v.showPublish }}\" hint-placeholder-val=\"{{ false }}\">\n                    <button style=\"padding:6px 0; border-radius:7px; background:rgba(99,102,241,0.14); border:1px solid rgba(99,102,241,0.3); color:#a5b4fc; font-size:11px; font-weight:600; cursor:pointer;\">Publish<\u002Fbutton>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ viewIs.agents }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; flex-direction:column; gap:20px; animation:fadeUp 0.4s ease;\">\n          <div>\n            <h1 style=\"margin:0 0 4px 0; font-size:24px; font-weight:800; color:#fafafa; letter-spacing:-0.02em;\">Agents<\u002Fh1>\n            <p style=\"margin:0; font-size:13.5px; color:#71717a;\">Each stage of the pipeline is run by a dedicated AI agent.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:16px;\">\n            <sc-for list=\"{{ agentCards }}\" as=\"a\" hint-placeholder-count=\"7\">\n              <div style=\"border-radius:14px; padding:18px; background:rgba(17,24,39,0.5); border:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; gap:12px;\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n                  <div style=\"display:flex; align-items:center; gap:10px;\">\n                    <div style=\"width:34px; height:34px; border-radius:9px; background:{{ a.bg }}; display:flex; align-items:center; justify-content:center;\">\n                      <i data-lucide=\"{{ a.icon }}\" style=\"width:16px; height:16px; color:{{ a.color }};\"><\u002Fi>\n                    <\u002Fdiv>\n                    <span style=\"font-size:13.5px; font-weight:700; color:#f4f4f5;\">{{ a.name }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"width:8px; height:8px; border-radius:50%; background:{{ a.statusDot }};\"><\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n                  <div><div style=\"font-size:10px; color:#71717a;\">Avg Time<\u002Fdiv><div style=\"font-size:13px; font-weight:600; color:#d4d4d8; margin-top:2px;\">{{ a.avgTime }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:10px; color:#71717a;\">Tokens<\u002Fdiv><div style=\"font-size:13px; font-weight:600; color:#d4d4d8; margin-top:2px;\">{{ a.tokens }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:10px; color:#71717a;\">Cost / run<\u002Fdiv><div style=\"font-size:13px; font-weight:600; color:#d4d4d8; margin-top:2px;\">{{ a.cost }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:10px; color:#71717a;\">Cache Hit<\u002Fdiv><div style=\"font-size:13px; font-weight:600; color:#5eead4; margin-top:2px;\">{{ a.cacheHit }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <sc-raw-select value=\"{{ a.provider }}\" sc-camel-on-change=\"{{ a.onProviderChange }}\" style=\"background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:#d4d4d8; font-size:11.5px; padding:7px 10px; border-radius:8px; outline:none; cursor:pointer; width:100%;\">\n                  <sc-for list=\"{{ a.providerOptions }}\" as=\"po\" hint-placeholder-count=\"3\">\n                    <option value=\"{{ po }}\">{{ po }}<\u002Foption>\n                  <\u002Fsc-for>\n                <\u002Fsc-raw-select>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ viewIs.providers }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; flex-direction:column; gap:20px; animation:fadeUp 0.4s ease;\">\n          <div>\n            <h1 style=\"margin:0 0 4px 0; font-size:24px; font-weight:800; color:#fafafa; letter-spacing:-0.02em;\">Provider Manager<\u002Fh1>\n            <p style=\"margin:0; font-size:13.5px; color:#71717a;\">Assign a model provider to each pipeline stage — switch freely between free and paid tiers.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border-radius:14px; border:1px solid rgba(255,255,255,0.06); overflow:hidden;\">\n            <div style=\"display:grid; grid-template-columns:1.3fr 1.6fr 0.7fr 0.9fr; padding:12px 18px; background:rgba(255,255,255,0.03); font-size:10.5px; font-weight:700; color:#71717a; text-transform:uppercase; letter-spacing:0.05em;\">\n              <div>Stage<\u002Fdiv><div>Provider<\u002Fdiv><div>Tier<\u002Fdiv><div>Est. Cost / 1K runs<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ providerRows }}\" as=\"row\" hint-placeholder-count=\"7\">\n              <div style=\"display:grid; grid-template-columns:1.3fr 1.6fr 0.7fr 0.9fr; padding:14px 18px; align-items:center; border-top:1px solid rgba(255,255,255,0.05);\">\n                <div style=\"font-size:12.5px; font-weight:600; color:#e4e4e7;\">{{ row.stage }}<\u002Fdiv>\n                <sc-raw-select value=\"{{ row.provider }}\" sc-camel-on-change=\"{{ row.onChange }}\" style=\"background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:#d4d4d8; font-size:12px; padding:6px 10px; border-radius:8px; outline:none; cursor:pointer; width:fit-content;\">\n                  <sc-for list=\"{{ row.options }}\" as=\"po\" hint-placeholder-count=\"3\">\n                    <option value=\"{{ po }}\">{{ po }}<\u002Foption>\n                  <\u002Fsc-for>\n                <\u002Fsc-raw-select>\n                <div><span style=\"font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:6px; background:{{ row.tierBg }}; color:{{ row.tierColor }};\">{{ row.tier }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:12.5px; color:#a1a1aa;\">{{ row.cost }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ viewIs.prompts }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; flex-direction:column; gap:20px; animation:fadeUp 0.4s ease;\">\n          <div>\n            <h1 style=\"margin:0 0 4px 0; font-size:24px; font-weight:800; color:#fafafa; letter-spacing:-0.02em;\">Prompt Library<\u002Fh1>\n            <p style=\"margin:0; font-size:13.5px; color:#71717a;\">Versioned prompt templates for every agent in the pipeline.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:230px 1fr; gap:18px; align-items:start;\">\n            <div style=\"display:flex; flex-direction:column; gap:4px;\">\n              <sc-for list=\"{{ promptList }}\" as=\"p\" hint-placeholder-count=\"6\">\n                <div sc-camel-on-click=\"{{ p.onClick }}\" style=\"padding:10px 12px; border-radius:9px; cursor:pointer; background:{{ p.bg }};\">\n                  <div style=\"font-size:12.5px; font-weight:600; color:{{ p.color }};\">{{ p.name }}<\u002Fdiv>\n                  <div style=\"font-size:10.5px; color:#52525b; margin-top:2px;\">v{{ p.version }} · {{ p.updated }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border-radius:14px; padding:20px; background:rgba(17,24,39,0.5); border:1px solid rgba(255,255,255,0.06);\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n                <div style=\"font-size:14px; font-weight:700; color:#f4f4f5;\">{{ promptSelected.name }} — v{{ promptSelected.version }}<\u002Fdiv>\n                <div style=\"display:flex; gap:8px;\">\n                  <button sc-camel-on-click=\"{{ promptToggleDiff }}\" style=\"padding:7px 14px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); color:#d4d4d8; font-size:11.5px; font-weight:600; cursor:pointer;\">{{ promptDiffLabel }}<\u002Fbutton>\n                  <button style=\"padding:7px 14px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); color:#d4d4d8; font-size:11.5px; font-weight:600; cursor:pointer;\">Export<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ promptShowDiff }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-family:monospace; font-size:12px; line-height:1.8; background:rgba(0,0,0,0.25); border-radius:10px; padding:16px;\">\n                  <div style=\"color:#f87171; background:rgba(239,68,68,0.08);\">- {{ promptSelected.prevLine }}<\u002Fdiv>\n                  <div style=\"color:#4ade80; background:rgba(34,197,94,0.08);\">+ {{ promptSelected.newLine }}<\u002Fdiv>\n                  <div style=\"color:#a1a1aa;\">{{ promptSelected.body }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ promptShowEdit }}\" hint-placeholder-val=\"{{ true }}\">\n                <textarea style=\"width:100%; min-height:220px; background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:14px; font-family:monospace; font-size:12px; color:#d4d4d8; outline:none; resize:vertical;\">{{ promptSelected.newLine }}\n{{ promptSelected.body }}<\u002Ftextarea>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ viewIs.characters }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; flex-direction:column; gap:20px; animation:fadeUp 0.4s ease;\">\n          <div>\n            <h1 style=\"margin:0 0 4px 0; font-size:24px; font-weight:800; color:#fafafa; letter-spacing:-0.02em;\">Characters<\u002Fh1>\n            <p style=\"margin:0; font-size:13.5px; color:#71717a;\">Recurring character archetypes kept consistent across all 1,330 videos.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px;\">\n            <sc-for list=\"{{ characterCards }}\" as=\"c\" hint-placeholder-count=\"8\">\n              <div style=\"border-radius:14px; overflow:hidden; background:rgba(17,24,39,0.5); border:1px solid rgba(255,255,255,0.06);\">\n                <div style=\"aspect-ratio:1; background:repeating-linear-gradient(135deg, rgba(99,102,241,0.10), rgba(99,102,241,0.10) 10px, rgba(20,184,166,0.08) 10px, rgba(20,184,166,0.08) 20px); display:flex; align-items:center; justify-content:center;\">\n                  <span style=\"font-family:monospace; font-size:10px; color:#71717a;\">portrait<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"padding:13px;\">\n                  <div style=\"font-size:13px; font-weight:700; color:#f4f4f5;\">{{ c.name }}<\u002Fdiv>\n                  <div style=\"font-size:11px; color:#71717a; margin-top:4px; line-height:1.5;\">{{ c.description }}<\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:10px;\">\n                    <span style=\"font-size:10.5px; color:#52525b;\">Consistency<\u002Fspan>\n                    <span style=\"font-size:11.5px; font-weight:700; color:#4ade80;\">{{ c.consistency }}%<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ vie 55,255,0.05); border:none; color:#a1a1aa; cursor:pointer; display:flex; align-items:center; justify-content:center;\"><i data-lucide=\"x\" style=\"width:14px; height:14px;\"><\u002Fi><\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px;\">\n              <div style=\"background:rgba(255,255,255,0.03); border-radius:10px; padding:12px;\"><div style=\"font-size:10.5px; color:#71717a;\">Avg Time<\u002Fdiv><div style=\"font-size:16px; font-weight:700; color:#f4f4f5; margin-top:4px;\">{{ stageDrawer.avgTime }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:rgba(255,255,255,0.03); border-radius:10px; padding:12px;\"><div style=\"font-size:10.5px; color:#71717a;\">Throughput<\u002Fdiv><div style=\"font-size:16px; font-weight:700; color:#f4f4f5; margin-top:4px;\">{{ stageDrawer.throughput }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:rgba(255,255,255,0.03); border-radius:10px; padding:12px;\"><div style=\"font-size:10.5px; color:#71717a;\">Provider<\u002Fdiv><div style=\"font-size:16px; font-weight:700; color:#f4f4f5; margin-top:4px;\">{{ stageDrawer.provider }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:rgba(255,255,255,0.03); border-radius:10px; padding:12px;\"><div style=\"font-size:10.5px; color:#71717a;\">Cost / unit<\u002Fdiv><div style=\"font-size:16px; font-weight:700; color:#f4f4f5; margin-top:4px;\">{{ stageDrawer.cost }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px; font-weight:700; color:#71717a; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;\">Recent Runs<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:8px;\">\n              <sc-for list=\"{{ stageDrawer.runs }}\" as=\"run\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:rgba(255,255,255,0.025); border-radius:9px; font-size:12px;\">\n                  <span style=\"color:#d4d4d8;\">Kural #{{ run.kural }}<\u002Fspan>\n                  <span style=\"color:#71717a;\">{{ run.time }}<\u002Fspan>\n                  <span style=\"color:{{ run.color }}; font-weight:600;\">{{ run.status }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst NAV_SECTIONS = [\n  { label: 'Overview', items: [\n    { key: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },\n  ]},\n  { label: 'Pipeline', items: [\n    { key: 'knowledge', label: 'Knowledge Base', icon: 'library', badge: '1330' },\n    { key: 'workflow', label: 'Workflow', icon: 'git-branch' },\n    { key: 'agents', label: 'Agents', icon: 'bot' },\n    { key: 'providers', label: 'Provider Manager', icon: 'server' },\n  ]},\n  { label: 'Content', items: [\n    { key: 'prompts', label: 'Prompt Library', icon: 'file-text' },\n    { key: 'characters', label: 'Characters', icon: 'users' },\n    { key: 'storyboards', label: 'Storyboards', icon: 'clapperboard' },\n    { key: 'videos', label: 'Videos', icon: 'video' },\n  ]},\n  { label: 'System', items: [\n    { key: 'reports', label: 'Reports', icon: 'bar-chart-3' },\n    { key: 'health', label: 'Health', icon: 'activity' },\n    { key: 'settings', label: 'Settings', icon: 'settings' },\n  ]},\n];\n\nconst VIEW_LABELS = {\n  dashboard: 'Dashboard', knowledge: 'Knowledge Base', workflow: 'Workflow', agents: 'Agents',\n  providers: 'Provider Manager', prompts: 'Prompt Library', characters: 'Characters',\n  storyboards: 'Storyboards', videos: 'Videos', reports: 'Reports', health: 'Health Dashboard', settings: 'Settings',\n};\n\nconst PIPELINE_DEF = [\n  { key: 'knowledge', label: 'Knowledge', icon: 'library', status: 'success' }, ovider: 'DeepSeek V3 (Free)', providerOptions: ['DeepSeek V3 (Free)', 'Qwen 3 (Free)', 'Claude Opus 4.6'] },\n  { key: 'director', name: 'Director Agent', icon: 'clapperboard', bg: 'rgba(245,158,11,0.15)', color: '#fbbf24', avgTime: '2.8s', tokens: '960', cost: '$0.000', cacheHit: '12%', provider: 'Qwen 3 (Free)', providerOptions: ['Qwen 3 (Free)', 'DeepSeek V3 (Free)'] },\n  { key: 'image', name: 'Image Agent', icon: 'image', bg: 'rgba(20,184,166,0.15)', color: '#5eead4', avgTime: '6.2s', tokens: '—', cost: '$0.024', cacheHit: '8%', provider: 'Flux Schnell', providerOptions: ['Flux Schnell', 'SDXL', 'Recraft V3'] },\n  { key: 'voice', name: 'Voice Agent', icon: 'mic', bg: 'rgba(239,68,68,0.15)', color: '#f87171', avgTime: '5.6s', tokens: '—', cost: '$0.011', cacheHit: '22%', provider: 'ElevenLabs', providerOptions: ['ElevenLabs', 'Hermes TTS', 'Azure TTS'] },\n  { key: 'qa', name: 'QA Agent', icon: 'shield-check', bg: 'rgba(34,197,94,0.15)', color: '#4ade80', avgTime: '3.4s', tokens: '640', cost: '$0.000', cacheHit: '41%', provider: 'Gemini 2.5 Flash Lite (Free)', providerOptions: ['Gemini 2.5 Flash Lite (Free)', 'Claude Opus 4.6', 'DeepSeek V3 (Free)'] },\n];\n\nconst PROVIDER_ROWS_DEF = [\n  { stage: 'Knowledge', options: ['SQLite'], tier: 'Local', cost: '$0.00' },\n  { stage: 'Education', options: ['DeepSeek V3.1 (Free)', 'Qwen 3 (Free)', 'Gemini 2.5 Flash Lite (Free)'], tier: 'Free', cost: '$0.00' },\n  { stage: 'Story', options: ['DeepSeek V3 (Free)', 'Claude Opus 4.6'], tier: 'Free', cost: '$0.00' },\n  { stage: 'Director', options: ['Qwen 3 (Free)', 'DeepSeek V3 (Free)'], tier: 'Free', cost: '$0.00' },\n  { stage: 'Prompt', options: ['DeepSeek V3 (Free)', 'Qwen 3 (Free)'], tier: 'Free', cost: '$0.00' },\n  { stage: 'QA', options: ['Gemini 2.5 Flash Lite (Free)', 'Claude Opus 4.6'], tier: 'Free', cost: '$0.00' },\n  { stage: 'Production Review', options: ['Claude Opus 4.6', 'GPT-5.1'], tier: 'Optional', cost: '$4.80' },\n];\n\nconst PROMPT_DEF = [\n  { key: 'education', name: 'Education Prompt', version: 4, updated: '2d ago', prevLine: 'You are a Tamil literature teacher.', newLine: 'You are a warm, plain-spoken Tamil literature teacher for a general audience.', body: 'Explain the kural in 2-3 sentences. Avoid academic jargon. Keep the meaning faithful to the commentary tradition.' },\n  { key: 'story', name: 'Story Prompt', version: 6, updated: '5h ago', prevLine: 'Write a 60 second story based on the kural.', newLine: 'Write a 60 second animated story that dramatizes the kural through one small, relatable moment.', body: 'Cast two characters from the roster. End on the moral landing softly, not preachy.' },\n  { key: 'director', name: 'Director Prompt', version: 2, updated: '1w ago', prevLine: 'Break the story into scenes.', newLine: 'Break the story into 5 scenes with shot type, pacing, and camera direction.', body: 'Keep total runtime at 60 seconds. Reserve the final 8 seconds for the verse card.' },\n  { key: 'image', name: 'Image Prompt', version: 9, updated: '3d ago', prevLine: 'Describe the scene for image generation.', newLine: 'Describe the scene, characters, lighting, and style for image generation in painterly folk-art style.', body: 'Always include character reference tags for consistency.' },\n  { key: 'voice', name: 'Voice Prompt', version: 3, updated: '4d ago', prevLine: 'Narrate in a neutral tone.', newLine: 'Narrate warmly, like an elder telling a story to a child.', body: 'Pace: 145 words per minute. Pause 400ms before the verse reveal.' },\n  { key: 'qa', name: 'QA Prompt', version: 5, updated: '6h ago', prevLine: 'Check subtitle accuracy.', newLine: 'Check subtitle accuracy, character consistency, and audio sync against the source kural.', body: 'Flag anything below 90% confidence for human review.' },\n];\n\nconst CHARACTER_DEF = [\n  { name: 'Old Wise Man', description: 'The recurring narrator archetype — grounded, patient, speaks in parables.' },\n  { name: 'Village Boy', description: 'Curious and impulsive; often the one who needs the lesson.' },\n  { name: 'Village Girl', description: 'Observant and quick-witted; frequently the voice of reason.' },\n  { name: 'Mother', description: 'Warm authority figure representing home and duty.' },\n  { name: 'Farmer', description: 'Grounded in labor and the land; embodies patience and honest work.' },\n  { name: 'King', description: 'Represents power, justice, and the burden of rule.' },\n  { name: 'Teacher', description: 'Formal educator archetype, distinct from the Old Wise Man\\u2019s folk wisdom.' },\n  { name: 'Merchant', description: 'Represents wealth, trade, and the ethics of commerce.' },\n];\n\nconst KB_TABS = [\n  { key: 'overview', label: 'Kural' }, { key: 'story', label: 'Story' }, { key: 'script', label: 'Script' },\n  { key: 'images', label: 'Images' }, { key: 'video', label: 'Video' }, { key: 'qa', label: 'QA' }, { key: 'publish', label: 'Publish' },\n];\n\nclass Component extends DCLogic {\n  state = {\n    view: 'dashboard',\n    selectedModel: 'DeepSeek V3.1 (Free)',\n    stageDrawer: null,\n    kbSearch: '', kbBook: 'all', kbChapter: 'all', kbPage: 0,\n    kbDetailNum: null, kbTab: 'overview',\n    providerOverrides: {}, promptTab: 'education', promptShowDiff: false,\n    settingsProfile: 'Free Profile', settingsEnv: 'Development',\n  };\n\n  dailyChart = null;\n  costChart = null;\n  tokenChart = null;\n  cacheChart = null;\n  qualityChart = null;\n  durationChart = null;\n\n  componentDidMount() {\n    if (window.lucide) window.lucide.createIcons();\n    if (!KDATA) {\n      const waitForResource = (tries) => {\n        if (window.__resources && window.__resources.kdata) {\n          import(window.__resources.kdata).then(m => { KDATA = m; this.forceUpdate(); });\n        } else if (tries > 0) {\n          setTimeout(() => waitForResource(tries - 1), 50);\n        } else {\n          import('./thirukkural-data.js').then(m => { KDATA = m; this.forceUpdate(); });\n        }\n      };\n      waitForResource(100);\n    }\n  }\n  componentDidUpdate() {\n    if (window.lucide) window.lucide.createIcons();\n  }\n\n  setView(key) {\n    this.setState({ view: key });\n  }\n\n  openStage(def) {\n    const sc = STATUS_COLORS[def.status];\n    this.setState({\n      stageDrawer: {\n        ...def, ...sc, statusLabel: sc.label,\n        avgTime: (Math.random() * 3 + 0.5).toFixed(1) + 's',\n        throughput: Math.floor(Math.random() * 40 + 60) + '/hr',\n        provider: ['DeepSeek V3.1', 'Qwen 3', 'Gemini 2.5 Flash Lite', 'SQLite', 'FFmpeg'][Math.floor(Math.random() * 5)],\n        cost: '$' + (Math.random() * 0.05).toFixed(4),\n        runs: [1, 2, 3, 4].map(() => ({\n          kural: Math.floor(Math.random() * 1330) + 1,\n          time: Math.floor(Math.random() * 50 + 5) + 's ago',\n          status: Math.random() > 0.15 ? 'Done' : 'Retrying',\n          color: Math.random() > 0.15 ? '#22C55E' : '#F59E0B',\n        })),\n      },\n    });\n  }\n\n  initDailyChart(node) {\n    if (!node || (this.dailyChart && this.dailyChart.canvas === node)) return;\n    if (this.dailyChart) { this.dailyChart.destroy(); this.dailyChart = null; }\n    {\n      this.dailyChart = new Chart(node, {\n      type: 'bar',\n      data: {\n        labels: Array.from({ length: 14 }, (_, i) => 'D' + (i + 1)),\n        datasets: [{\n          data: [12, 18, 14, 22, 19, 26, 21, 30, 24, 28, 33, 27, 31, 36],\n          backgroundColor: 'rgba(99,102,241,0.55)',\n          borderRadius: 5, maxBarThickness: 18,\n        }],\n      },\n      options: {\n        responsive: true, maintainAspectRatio: false, animation: false,\n        plugins: { legend: { display: false } },\n        scales: {\n          x: { grid: { display: false }, ticks: { color: '#71717a', font: { size: 10 } } },\n          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#71717a', font: { size: 10 } } },\n        },\n      },\n      });\n    }\n  }\n\n  initCostChart(node) {\n    if (!node || (this.costChart && this.costChart.canvas === node)) return;\n    if (this.costChart) { this.costChart.destroy(); this.costChart = null; }\n    {\n      this.costChart = new Chart(node, {\n      type: 'doughnut',\n      data: {\n        labels: ['Story', 'Image', 'Voice', 'QA', 'Render'],\n        datasets: [{\n          data: [18, 34, 22, 8, 18],\n          backgroundColor: ['#6366F1', '#14B8A6', '#8b5cf6', '#F59E0B', '#22C55E'],\n          borderColor: '#111827', borderWidth: 2,\n        }],\n      },\n      options: {\n        responsive: true, maintainAspectRatio: false, animation: false,\n        plugins: { legend: { position: 'bottom', labels: { color: '#a1a1aa', boxWidth: 10, font: { size: 10.5 }, padding: 12 } } },\n      },\n      });\n    }\n  }\n\n  initTokenChart(node) {\n    if (!node || this.tokenChart) return;\n    setTimeout(() => {\n      if (this.tokenChart) return;\n      this.tokenChart = new Chart(node, {\n      type: 'bar',\n      data: {\n        labels: ['Education', 'Story', 'Director', 'Prompt', 'QA'],\n        datasets: [{ data: [820, 1140, 960, 540, 640], backgroundColor: 'rgba(20,184,166,0.55)', borderRadius: 5, maxBarThickness: 26 }],\n      },\n      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } },\n        scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#71717a', font: { size: 10 } } }, y: { grid: { display: false }, ticks: { color: '#a1a1aa', font: { size: 10.5 } } } } },\n      });\n    });\n  }\n  initCacheChart(node) {\n    if (!node || this.cacheChart) return;\n    setTimeout(() => {\n      if (this.cacheChart) return;\n      this.cacheChart = new Chart(node, {\n      type: 'line',\n      data: { labels: Array.from({ length: 14 }, (_, i) => 'D' + (i + 1)),\n        datasets: [{ data: [12, 15, 18, 20, 19, 24, 27, 25, 29, 31, 30, 33, 35, 34], borderColor: '#6366F1', backgroundColor: 'rgba(99,102,241,0.15)', fill: true, tension: 0.35, pointRadius: 0 }] },\n      options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } },\n        scales: { x: { grid: { display: false }, ticks: { color: '#71717a', font: { size: 10 } } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#71717a', font: { size: 10 } } } } },\n      });\n    });\n  }\n  initQualityChart(node) {\n    if (!node || this.qualityChart) return;\n    setTimeout(() => {\n      if (this.qualityChart) return;\n      this.qualityChart = new Chart(node, {\n      type: 'line',\n      data: { labels: Array.from({ length: 14 }, (_, i) => 'D' + (i + 1)),\n        datasets: [{ data: [8.1, 8.2, 8.4, 8.3, 8.5, 8.6, 8.5, 8.7, 8.8, 8.6, 8.9, 8.7, 8.8, 8.7], borderColor: '#22C55E', backgroundColor: 'rgba(34,197,94,0.15)', fill: true, tension: 0.35, pointRadius: 0 }] },\n      options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } },\n        scales: { x: { grid: { display: false }, ticks: { color: '#71717a', font: { size: 10 } } }, y: { min: 7, max: 10, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#71717a', font: { size: 10 } } } } },\n      });\n    });\n  }\n  initDurationChart(node) {\n    if (!node || this.durationChart) return;\n    setTimeout(() => {\n      if (this.durationChart) return;\n      this.durationChart = new Chart(node, {\n      type: 'doughnut',\n      data: { labels: ['Story/Script', 'Images', 'Voice/Music', 'Render', 'QA'],\n        datasets: [{ data: [22, 30, 20, 20, 8], backgroundColor: ['#6366F1', '#14B8A6', '#8b5cf6', '#F59E0B', '#EF4444'], borderColor: '#111827', borderWidth: 2 }] },\n      options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { position: 'bottom', labels: { color: '#a1a1aa', boxWidth: 10, font: { size: 10.5 }, padding: 12 } } } },\n      });\n    });\n  }\n\n  renderVals() {\n    const view = this.state.view;\n    const viewIs = {};\n    Object.keys(VIEW_LABELS).forEach(k => { viewIs[k] = view === k; });\n\n    const navSections = NAV_SECTIONS.map(sec => ({\n      label: sec.label,\n      items: sec.items.map(it => ({\n        ...it,\n        onClick: () => this.setView(it.key),\n        style: `display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; cursor:pointer; margin-bottom:1px; transition:background 0.15s; color:${view === it.key ? '#f4f4f5' : '#a1a1aa'}; background:${view === it.key ? 'rgba(99,102,241,0.14)' : 'transparent'}; ${view === it.key ? 'box-shadow: inset 2px 0 0 #6366F1;' : ''}`,\n      })),\n    }));\n\n    const healthDots = Array.from({ length: 8 }, (_, i) => ({\n      style: `width:16px; height:6px; border-radius:3px; background:${i < 7 ? '#22C55E' : '#F59E0B'};`,\n    }));\n\n    const pipelineStages = PIPELINE_DEF.map((def, i) => {\n      const sc = STATUS_COLORS[def.status];\n      return {\n        ...def, ...sc,\n        pulse: def.status !== 'success' ? 'animation:pulseDot 1.4s ease-in-out infinite;' : '',\n        hasNext: i < PIPELINE_DEF.length - 1,\n        onClick: () => this.openStage(def),\n      };\n    });\n\n    let stageDrawer = null;\n    if (this.state.stageDrawer) {\n      stageDrawer = this.state.stageDrawer;\n    }\n\n    // ---------- Knowledge Base ----------\n    let kbVals = {\n      kbSearch: this.state.kbSearch, onKbSearch: (e) => this.setState({ kbSearch: e.target.value, kbPage: 0 }),\n      kbBook: this.state.kbBook, onKbBook: (e) => this.setState({ kbBook: e.target.value, kbChapter: 'all', kbPage: 0 }),\n      kbChapter: this.state.kbChapter, onKbChapter: (e) => this.setState({ kbChapter: e.target.value, kbPage: 0 }),\n      kbChapterOptions: [], kbPageItems: [], kbFilteredCount: 0, kbRangeText: '0–0', kbPageDisplay: 1, kbPageCount: 1,\n      kbProcessedPct: 0, kbPrevPage: () => {}, kbNextPage: () => {},\n      kbDetail: null, kbTabs: [], kbTabIs: {}, kbStory: {}, kbScript: [], kbImages: [], kbVideo: {}, kbQa: {}, kbQaColors: {}, kbPublish: {},\n      closeKbDetail: () => this.setState({ kbDetailNum: null }),\n    };\n\n    if (KDATA) {\n      const all = KDATA.getAllKurals();\n      const chapterOptions = KDATA.CHAPTERS\n        .filter(c => this.state.kbBook === 'all' || c.book === this.state.kbBook)\n        .map(c => ({ value: String(c.num), text: `${c.num}. ${c.tamil}` }));\n\n      const q = this.state.kbSearch.trim().toLowerCase();\n      const filtered = all.filter(k => {\n        if (this.state.kbBook !== 'all' && k.book !== this.state.kbBook) return false;\n        if (this.state.kbChapter !== 'all' && String(k.chapterNum) !== this.state.kbChapter) return false;\n        if (q) {\n          const hay = (String(k.num) + ' ' + k.chapterTamil + ' ' + k.chapterEnglish + ' ' + (k.english || '')).toLowerCase();\n          if (!hay.includes(q)) return false;\n        }\n        return true;\n      });\n\n      const PAGE_SIZE = 24;\n      const pageCount = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));\n      const page = Math.min(this.state.kbPage, pageCount - 1);\n      const start = page * PAGE_SIZE;\n      const pageSlice = filtered.slice(start, start + PAGE_SIZE);\n\n      const processedCount = all.filter(k => k.storyStage !== 'queued').length;\n\n      kbVals = {\n        ...kbVals,\n        kbChapterOptions: chapterOptions,\n        kbFilteredCount: filtered.length,\n        kbRangeText: filtered.length ? `${start + 1}–${Math.min(start + PAGE_SIZE, filtered.length)}` : '0–0',\n        kbPageDisplay: page + 1,\n        kbPageCount: pageCount,\n        kbProcessedPct: Math.round((processedCount / 1330) * 100),\n        kbPrevPage: () => this.setState({ kbPage: Math.max(0, page - 1) }),\n        kbNextPage: () => this.setState({ kbPage: Math.min(pageCount - 1, page + 1) }),\n        kbPageItems: pageSlice.map(k => {\n          const sc = STAGE_COLORS[k.storyStage];\n          return {\n            ...k, stageBg: sc.bg, stageColor: sc.color,\n            tamilPreview: k.tamil ? k.tamil.join(' ') : `Ch. ${k.chapterNum} · ${k.chapterEnglish}`,\n            onClick: () => this.setState({ kbDetailNum: k.num, kbTab: 'overview' }),\n          };\n        }),\n      };\n\n      if (this.state.kbDetailNum) {\n        const k = all[this.state.kbDetailNum - 1];\n        const tab = this.state.kbTab;\n        const kbTabIs = {};\n        KB_TABS.forEach(t => { kbTabIs[t.key] = t.key === tab; });\n        const story = KDATA.generateStory(k);\n        const qa = KDATA.generateQaPlan(k);\n        const pub = KDATA.generatePublishPlan(k);\n\n        kbVals.kbDetail = { ...k, tamilLine1: k.tamil ? k.tamil[0] : '', tamilLine2: k.tamil ? k.tamil[1] : '' };\n        kbVals.kbTabIs = kbTabIs;\n        kbVals.kbTabs = KB_TABS.map(t => ({\n          ...t,\n          onClick: () => this.setState({ kbTab: t.key }),\n          style: `padding:10px 4px; margin-right:20px; font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap; color:${t.key === tab ? '#f4f4f5' : '#71717a'}; border-bottom:2px solid ${t.key === tab ? '#6366F1' : 'transparent'};`,\n        }));\n        kbVals.kbStory = story;\n        kbVals.kbScript = KDATA.generateScript(k);\n        kbVals.kbImages = KDATA.generateImagePlan(k);\n        kbVals.kbVideo = KDATA.generateVideoPlan(k);\n        kbVals.kbQa = qa;\n        kbVals.kbQaColors = { text: qa.pass ? '#22C55E' : '#F59E0B', char: qa.charCheck.startsWith('Pass') ? '#22C55E' : '#F59E0B' };\n        kbVals.kbPublish = {\n          ...pub,\n          platforms: pub.platforms.map(p => ({\n            ...p,\n            badgeLabel: p.live ? 'Live' : 'Pending',\n            badgeBg: p.live ? 'rgba(34,197,94,0.16)' : 'rgba(113,113,122,0.16)',\n            badgeColor: p.live ? '#4ade80' : '#a1a1aa',\n          })),\n        };\n      }\n    }\n\n    // ---------- Workflow ----------\n    const workflowStages = WORKFLOW_DEF.map((wf, i) => {\n      const sc = STATUS_COLORS[wf.status];\n      return { ...wf, ...sc, statusLabel: sc.label, hasNext: i < WORKFLOW_DEF.length - 1 };\n    });\n\n    // ---------- Videos ----------\n    let vidVals = { vidSearch: this.state.vidSearch || '', vidStatus: this.state.vidStatus || 'all', vidCount: 0, vidItems: [] };\n    vidVals.onVidSearch = (e) => this.setState({ vidSearch: e.target.value });\n    vidVals.onVidStatus = (e) => this.setState({ vidStatus: e.target.value });\n    if (KDATA) {\n      const all = KDATA.getAllKurals().filter(k => k.storyStage === 'video_ready' || k.storyStage === 'published');\n      const q = (this.state.vidSearch || '').trim().toLowerCase();\n      const vFiltered = all.filter(k => {\n        if (this.state.vidStatus && this.state.vidStatus !== 'all' && k.storyStage !== this.state.vidStatus) return false;\n        if (q && !((String(k.num) + ' ' + k.chapterEnglish).toLowerCase().includes(q))) return false;\n        return true;\n      });\n      vidVals.vidCount = vFiltered.length;\n      vidVals.vidItems = vFiltered.slice(0, 30).map(k => {\n        const sc = STAGE_COLORS[k.storyStage];\n        const vp = KDATA.generateVideoPlan(k);\n        return {\n          ...k, stageBg: sc.bg, stageColor: sc.color, duration: vp.duration, quality: vp.quality || '—',\n          createdText: (seeded(k.num, 6) + 1) + 'd ago', showApprove: k.storyStage === 'video_ready', showPublish: k.storyStage === 'video_ready',\n        };\n      });\n    }\n    function seeded(num, mod) { return (num * 2654435761 % 2147483647) % mod; }\n\n    // ---------- Agents ----------\n    const agentProviders = this.state.agentProviders || {};\n    const agentCards = AGENT_DEF.map(a => ({\n      ...a,\n      statusDot: '#22C55E',\n      provider: agentProviders[a.key] || a.provider,\n      onProviderChange: (e) => this.setState({ agentProviders: { ...agentProviders, [a.key]: e.target.value } }),\n    }));\n\n    // ---------- Providers ----------\n    const providerOverrides = this.state.providerOverrides;\n    const providerRows = PROVIDER_ROWS_DEF.map(r => ({\n      ...r,\n      provider: providerOverrides[r.stage] || r.options[0],\n      onChange: (e) => this.setState({ providerOverrides: { ...providerOverrides, [r.stage]: e.target.value } }),\n      tierBg: r.tier === 'Free' ? 'rgba(34,197,94,0.14)' : r.tier === 'Local' ? 'rgba(99,102,241,0.14)' : 'rgba(245,158,11,0.14)',\n      tierColor: r.tier === 'Free' ? '#4ade80' : r.tier === 'Local' ? '#a5b4fc' : '#fbbf24',\n    }));\n\n    // ---------- Prompts ----------\n    const promptTab = this.state.promptTab;\n    const promptList = PROMPT_DEF.map(p => ({\n      ...p, onClick: () => this.setState({ promptTab: p.key }),\n      bg: p.key === promptTab ? 'rgba(99,102,241,0.14)' : 'transparent',\n      color: p.key === promptTab ? '#f4f4f5' : '#a1a1aa',\n    }));\n    const promptSelected = PROMPT_DEF.find(p => p.key === promptTab) || PROMPT_DEF[0];\n\n    // ---------- Characters ----------\n    const characterCards = CHARACTER_DEF.map((c, i) => ({ ...c, consistency: 94 + (i % 5) }));\n\n    // ---------- Storyboards ----------\n    let storyboardRows = [];\n    if (KDATA) {\n      storyboardRows = KDATA.getAllKurals().slice(0, 4).map(k => ({ num: k.num, chapterEnglish: k.chapterEnglish, frames: [1, 2, 3, 4, 5] }));\n    }\n\n    // ---------- Health ----------\n    const healthServices = [\n      { name: 'SQLite', latency: '2ms', status: 'PASS', dot: '#22C55E' },\n      { name: 'JSON Store', latency: '4ms', status: 'PASS', dot: '#22C55E' },\n      { name: 'OpenRouter', latency: '340ms', status: 'PASS', dot: '#22C55E' },\n      { name: 'Hermes', latency: '512ms', status: 'PASS', dot: '#22C55E' },\n      { name: 'OpenMontage', latency: '1.2s', status: 'PASS', dot: '#22C55E' },\n      { name: 'FFmpeg', latency: '38ms', status: 'PASS', dot: '#22C55E' },\n      { name: 'Image Provider', latency: '2.1s', status: 'DEGRADED', dot: '#F59E0B' },\n      { name: 'TTS Provider', latency: '890ms', status: 'PASS', dot: '#22C55E' },\n    ];\n\n    // ---------- Settings ----------\n    const settingsProfiles = ['Free Profile', 'Hermes Profile'].map(label => ({\n      label, onClick: () => this.setState({ settingsProfile: label }),\n      style: `padding:8px 16px; border-radius:8px; cursor:pointer; font-size:12.5px; font-weight:600; background:${this.state.settingsProfile === label ? 'rgba(99,102,241,0.16)' : 'rgba(255,255,255,0.04)'}; color:${this.state.settingsProfile === label ? '#a5b4fc' : '#a1a1aa'}; border:1px solid ${this.state.settingsProfile === label ? 'rgba(99,102,241,0.3)' : 'rgba(255,255,255,0.07)'};`,\n    }));\n    const settingsEnvs = ['Development', 'Production'].map(label => ({\n      label, onClick: () => this.setState({ settingsEnv: label }),\n      style: `padding:8px 16px; border-radius:8px; cursor:pointer; font-size:12.5px; font-weight:600; background:${this.state.settingsEnv === label ? 'rgba(20,184,166,0.16)' : 'rgba(255,255,255,0.04)'}; color:${this.state.settingsEnv === label ? '#5eead4' : '#a1a1aa'}; border:1px solid ${this.state.settingsEnv === label ? 'rgba(20,184,166,0.3)' : 'rgba(255,255,255,0.07)'};`,\n    }));\n    const apiKeyRows = [\n      { name: 'OpenRouter', masked: 'sk-or-••••••••4f2a' },\n      { name: 'ElevenLabs', masked: '••••••••••••9b1c' },\n      { name: 'Flux (Image)', masked: '••••••••••••7e3d' },\n      { name: 'OpenMontage', masked: 'local — no key required' },\n    ];\n\n    return {\n      ...kbVals,\n      workflowStages,\n      ...vidVals,\n      agentCards,\n      providerRows,\n      promptList, promptSelected,\n      promptShowDiff: this.state.promptShowDiff,\n      promptShowEdit: !this.state.promptShowDiff,\n      promptDiffLabel: this.state.promptShowDiff ? 'Edit' : 'View Diff',\n      promptToggleDiff: () => this.setState({ promptShowDiff: !this.state.promptShowDiff }),\n      characterCards,\n      storyboardRows,\n      healthServices,\n      settingsProfiles, settingsEnvs, apiKeyRows,\n      tokenChartRef: (node) => this.initTokenChart(node),\n      cacheChartRef: (node) => this.initCacheChart(node),\n      qualityChartRef: (node) => this.initQualityChart(node),\n      durationChartRef: (node) => this.initDurationChart(node),\n      navSections,\n      currentViewLabel: VIEW_LABELS[view],\n      selectedModel: this.state.selectedModel,\n      onModelChange: (e) => this.setState({ selectedModel: e.target.value }),\n      viewIs,\n      healthDots,\n      videoStats: VIDEO_STATS,\n      pipelineStages,\n      dailyChartRef: (node) => this.initDailyChart(node),\n      costChartRef: (node) => this.initCostChart(node),\n      stageDrawer,\n      closeDrawer: () => this.setState({ stageDrawer: null }),\n      stopProp: (e) => e.stopPropagation(),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
